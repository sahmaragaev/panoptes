worker_processes auto;

events {
    worker_connections 1024;
}

http {
    lua_shared_dict api_keys 1m;
    lua_shared_dict keys_meta 64k;

    init_by_lua_block {
        local keys_file = "/etc/nginx/api-keys.yml"

        function load_keys()
            local f = io.open(keys_file, "r")
            if not f then
                ngx.log(ngx.ERR, "failed to open api-keys.yml")
                return
            end
            local content = f:read("*a")
            f:close()

            local keys = ngx.shared.api_keys
            keys:flush_all()
            local current_name = nil
            for line in content:gmatch("[^\r\n]+") do
                local name = line:match("^%s*-%s*name:%s*(.+)%s*$")
                if name then
                    current_name = name
                end
                local key = line:match("^%s*key:%s*(.+)%s*$")
                if key and current_name then
                    keys:set(key, current_name)
                    current_name = nil
                end
            end
        end

        function reload_if_changed()
            local f = io.open(keys_file, "r")
            if not f then return end
            local content = f:read("*a")
            f:close()
            local prev = ngx.shared.keys_meta:get("content") or ""
            if content ~= prev then
                load_keys()
                ngx.shared.keys_meta:set("content", content)
            end
        end

        load_keys()
    }

    init_worker_by_lua_block {
        if ngx.worker.id() == 0 then
            ngx.timer.every(10, function(premature)
                if premature then return end
                reload_if_changed()
            end)
        end
    }

    server {
        listen 8080;

        location /health {
            access_log off;
            return 200 "ok";
        }

        location /api/v1/write {
            access_by_lua_block {
                local key = ngx.req.get_headers()["X-API-Key"]
                if not key then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "missing API key"}')
                    return ngx.exit(401)
                end
                local tenant = ngx.shared.api_keys:get(key)
                if not tenant then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "invalid API key"}')
                    return ngx.exit(401)
                end
                ngx.req.set_header("X-Tenant", tenant)
            }
            proxy_pass http://prometheus:9090;
        }

        location /loki/api/v1/push {
            access_by_lua_block {
                local key = ngx.req.get_headers()["X-API-Key"]
                if not key then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "missing API key"}')
                    return ngx.exit(401)
                end
                local tenant = ngx.shared.api_keys:get(key)
                if not tenant then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error": "invalid API key"}')
                    return ngx.exit(401)
                end
                ngx.req.set_header("X-Tenant", tenant)
            }
            proxy_pass http://loki:3100;
        }

        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
        }

        location /alertmanager/ {
            proxy_pass http://alertmanager:9093/;
        }

        location / {
            proxy_pass http://grafana:3000;
        }
    }
}
