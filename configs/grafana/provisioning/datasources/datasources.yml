apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093

  - name: Zabbix
    type: alexanderzobnin-zabbix-datasource
    access: proxy
    url: http://zabbix-web:8081/api_jsonrpc.php
    jsonData:
      username: Admin
    secureJsonData:
      password: zabbix
