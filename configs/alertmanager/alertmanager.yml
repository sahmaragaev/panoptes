global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_USER}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'telegram-warnings'
  group_by: ['alertname', 'severity', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      repeat_interval: 1h
    - match_re:
        remediation: '.+'
      receiver: 'webhook-remediation'
      group_wait: 10s
      continue: true

receivers:
  - name: 'telegram-warnings'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        message: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}{{ range .Alerts }}
{{ .Annotations.summary }}
{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'telegram-critical'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        message: '[CRITICAL] {{ .CommonLabels.alertname }}{{ range .Alerts }}
{{ .Annotations.summary }}
{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'webhook-remediation'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/webhook'
        send_resolved: false

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'instance']
  - source_matchers:
      - alertname = InstanceDown
    target_matchers:
      - severity =~ ".*"
    equal: ['instance']
