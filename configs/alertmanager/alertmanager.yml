global:
  resolve_timeout: 5m

route:
  receiver: 'tenant-notifier'
  group_by: ['alertname', 'severity', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'tenant-notifier'
      repeat_interval: 1h
    - match_re:
        remediation: '.+'
      receiver: 'webhook-remediation'
      group_wait: 10s
      continue: true

receivers:
  - name: 'tenant-notifier'
    webhook_configs:
      - url: 'http://tenant-notifier:5002/webhook'
        send_resolved: true

  - name: 'webhook-remediation'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/webhook'
        send_resolved: false

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'instance']
  - source_matchers:
      - alertname = InstanceDown
    target_matchers:
      - severity =~ ".*"
    equal: ['instance']
