apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-postgres
  namespace: panoptes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-postgres
  template:
    metadata:
      labels:
        app: zabbix-postgres
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: zabbix
            - name: POSTGRES_USER
              value: zabbix
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: panoptes-secrets
                  key: ZABBIX_DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - zabbix
            initialDelaySeconds: 30
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - zabbix
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: zabbix-postgres-data
