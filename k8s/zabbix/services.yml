apiVersion: v1
kind: Service
metadata:
  name: zabbix-server
  namespace: panoptes
spec:
  type: ClusterIP
  selector:
    app: zabbix-server
  ports:
    - port: 10051
      targetPort: 10051
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: panoptes
spec:
  type: ClusterIP
  selector:
    app: zabbix-web
  ports:
    - port: 8080
      targetPort: 8080
