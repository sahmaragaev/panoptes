apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: umas
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: umas
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by:
        - alertname
        - cluster
        - service
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: default
          continue: true

    receivers:
      - name: default

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal:
          - alertname
          - cluster
          - service

    templates: []
