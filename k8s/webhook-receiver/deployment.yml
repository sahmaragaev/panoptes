apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: umas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: webhook-receiver
          image: umas/webhook-receiver:latest
          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: ansible-config
              mountPath: /app/ansible
      volumes:
        - name: ansible-config
          configMap:
            name: webhook-receiver-config
