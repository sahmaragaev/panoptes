apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: panoptes-ingress
  namespace: panoptes
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - grafana.panoptes.example.com
        - prometheus.panoptes.example.com
        - alertmanager.panoptes.example.com
        - zabbix.panoptes.example.com
      secretName: panoptes-tls
  rules:
    - host: grafana.panoptes.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.panoptes.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: alertmanager.panoptes.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager
                port:
                  number: 9093
    - host: zabbix.panoptes.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zabbix-web
                port:
                  number: 8080
