services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
      - --web.enable-admin-api
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"
    mem_limit: 64m
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    mem_limit: 96m
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    volumes:
      - ./configs/loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    mem_limit: 384m
    profiles:
      - logging
      - full
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    volumes:
      - ./configs/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/lib/promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    mem_limit: 128m
    profiles:
      - logging
      - full
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    env_file: .env
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
    mem_limit: 192m
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8088:8080"
    mem_limit: 96m
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  custom-exporter:
    build: ./exporters/custom-exporter
    container_name: custom-exporter
    ports:
      - "9101:9101"
    volumes:
      - ./exporters/custom-exporter/config.yaml:/app/config.yaml:ro
    depends_on:
      - prometheus
    mem_limit: 64m
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9101/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  webhook-receiver:
    build: ./remediation/webhook-receiver
    container_name: webhook-receiver
    ports:
      - "5001:5001"
    volumes:
      - ./remediation/ansible:/app/ansible:ro
    depends_on:
      - alertmanager
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  tenant-notifier:
    build: ./remediation/tenant-notifier
    container_name: tenant-notifier
    environment:
      - KEYS_FILE=/etc/nginx/api-keys.yml
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./configs/nginx/api-keys.yml:/etc/nginx/api-keys.yml:ro
    depends_on:
      - alertmanager
    mem_limit: 32m
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  snmp-exporter:
    image: prom/snmp-exporter:v0.28.0
    volumes:
      - ./configs/snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks:
      - monitoring
    mem_limit: 64m
    restart: unless-stopped
    profiles:
      - snmp
      - full
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9116/"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx-gateway:
    image: openresty/openresty:1.27.1.2-alpine
    volumes:
      - ./configs/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./configs/nginx/api-keys.yml:/etc/nginx/api-keys.yml:ro
    ports:
      - "8081:8080"
    networks:
      - monitoring
    mem_limit: 64m
    restart: unless-stopped
    depends_on:
      - prometheus
    profiles:
      - saas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  promtail_positions:

networks:
  monitoring:
    driver: bridge
