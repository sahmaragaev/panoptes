services:
  prometheus:
    ports:
      - "9090:9090"
      - "9091:9090"
    environment:
      - PROMETHEUS_LOG_LEVEL=debug

  alertmanager:
    ports:
      - "9093:9093"
      - "9094:9093"

  grafana:
    ports:
      - "3000:3000"
      - "3001:3000"
    environment:
      - GF_LOG_LEVEL=debug
      - GF_SECURITY_ADMIN_PASSWORD=admin

  loki:
    ports:
      - "3100:3100"
      - "3101:3100"

  webhook-receiver:
    environment:
      - FLASK_DEBUG=1
      - LOG_LEVEL=DEBUG
